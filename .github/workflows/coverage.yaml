name: Coverage

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/coverage.yaml"
      - "sources/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/coverage.yaml"
      - "sources/**"
      - "scripts/**"

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run lint

  coverage:
    name: Coverage
    needs: lint
    runs-on: ubuntu-latest
    services:
      server:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Run coverage
        run: npm run test:coverage 2>&1 | tee /tmp/coverage.txt
        env:
          SOLIDIS_TEST_HOST: 127.0.0.1
          SOLIDIS_TEST_PORT: 6379
      - name: Generate report
        if: always()
        run: npm run --silent node:ts ./scripts/workflows/coverage/report.ts /tmp/coverage.txt /tmp/coverage.md
      - name: Job summary
        if: always()
        run: cat /tmp/coverage.md >> "$GITHUB_STEP_SUMMARY"
      - name: PR comment
        if: always() && github.event_name == 'pull_request'
        run: >-
          npm run node:ts ./scripts/workflows/coverage/comment.ts
          /tmp/coverage.md
          ${{ github.repository }}
          ${{ github.event.pull_request.number }}
          ${{ github.token }}
